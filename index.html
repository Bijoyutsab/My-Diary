<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="diary">
    <h1>📖 My Diary</h1>
    <textarea id="diaryPage" placeholder="Write your thoughts here..."></textarea>
    <div class="buttons">
      <button onclick="saveEntry()">Save</button>
      <button onclick="eraseEntry()">Erase</button>
      <button onclick="loadEntry()">Load</button>
    </div>
    <!-- Status message container at bottom corner -->
    <div class="status" id="statusMessage"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
